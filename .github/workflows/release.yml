name: Release

# Push a version tag (e.g. `git tag v0.1.2 && git push --tags`) and CI builds
# the card, creates the GitHub Release for that tag, and attaches the compiled
# JS. HACS downloads that asset. No manual release/upload step needed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create release and attach the built card
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lightweight-charts-card.js
          generate_release_notes: true
